name: Build mobile APK (local, no EAS quota)

# Runs the actual Android build on GitHub's own runner via `eas build --local`
# instead of queuing it on Expo's cloud build servers — this never touches
# the EAS Free plan's 15 Android builds/month cap, since Expo's infrastructure
# isn't doing any compute here. Needs an EXPO_TOKEN repo secret (Expo
# dashboard → Account Settings → Access Tokens) so the CLI can pull the
# project's existing remote Android signing credentials.
on:
  workflow_dispatch:
    inputs:
      app:
        description: "Which app to build"
        required: true
        default: both
        type: choice
        options:
          - customer
          - pro
          - admin
          - both
      profile:
        description: "EAS build profile"
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    runs-on: ubuntu-latest
    # A hung Gradle daemon (see GRADLE_OPTS below) previously sat "in
    # progress" for 4+ hours instead of failing — cap it so a future hang
    # fails fast instead of silently burning CI minutes.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        app: ${{ (github.event.inputs.app == 'both' && fromJSON('["customer","pro"]')) || fromJSON(format('["{0}"]', github.event.inputs.app)) }}
    defaults:
      run:
        working-directory: mobile/apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Install eas-cli
        if: matrix.app != 'admin'
        run: npm install -g eas-cli

      # customer/pro reuse the project's existing EAS-managed remote Android
      # signing keystore (needed for real Play Store / update continuity).
      # admin is an internal-only sideloaded tool with no EAS project
      # registered, so it skips EAS entirely and just does a plain Gradle
      # debug build (auto-signed with the runner's throwaway debug keystore).
      - name: Build APK locally (EAS, customer/pro)
        if: matrix.app != 'admin'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # The Kotlin/Gradle daemon ran out of Metaspace on the runner's
          # default JVM settings and got stuck retrying forever instead of
          # failing (that's what caused the earlier 4+ hour hang). Cap
          # heap/metaspace explicitly, turn off the daemon (nothing reuses
          # it in a one-shot CI build anyway) and disable parallelism so
          # there's only ever one JVM competing for the runner's ~7GB RAM.
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=768m"
            -Dorg.gradle.daemon=false
            -Dorg.gradle.parallel=false
            -Dorg.gradle.workers.max=1
        run: eas build --local --platform android --profile ${{ github.event.inputs.profile }} --non-interactive --output ./build-${{ matrix.app }}.apk

      - name: Prebuild native Android project (admin)
        if: matrix.app == 'admin'
        # customer/pro get this from eas.json's build-profile "env" block,
        # which only applies inside `eas build`. The admin build bypasses
        # EAS entirely (plain Gradle build), so it must be set explicitly
        # here or the app would silently bake in the localhost:3000 fallback.
        env:
          EXPO_PUBLIC_API_URL: https://www.servigic.com
        run: npx expo prebuild --platform android --non-interactive

      - name: Build APK locally (Gradle debug, admin)
        if: matrix.app == 'admin'
        env:
          EXPO_PUBLIC_API_URL: https://www.servigic.com
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=768m"
            -Dorg.gradle.daemon=false
            -Dorg.gradle.parallel=false
            -Dorg.gradle.workers.max=1
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ../build-admin.apk

      - uses: actions/upload-artifact@v4
        with:
          name: servigic-${{ matrix.app }}-${{ github.event.inputs.profile }}.apk
          path: mobile/apps/${{ matrix.app }}/build-${{ matrix.app }}.apk
          retention-days: 30
